apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: amazon
  name: amazon-trainee
rules:
  - apiGroups: [""] # "" indicates the core API group by default it is v1
    resources: ["pods"]  # nouns
    verbs: ["get", "watch", "list"]  # verbs

---

apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: amazon-trainee
  namespace: amazon
subjects:
  - kind: User
    name: suresh
    apiGroups: rbac.authorization.k8s.io
roleRef:
  kind: Role
  name: amazon-trainee
  apiGroups: rbac.authorization.k8s.io